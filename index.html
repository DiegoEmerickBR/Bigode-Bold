<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Diego Emerick</title>
  <meta property="og:title" content="Bigode Design & Bold Content" />
  <meta property="og:description" content="Confira os cases selecionados" />
  <meta property="og:image" content="https://diegoemerickbr.github.io/Bigode-Bold/preview.png" />
  <meta property="og:type" content="website" />
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="Bigode Design & Bold Content" />
  <meta name="twitter:description" content="Confira os cases selecionados" />
  <meta name="twitter:image" content="https://diegoemerickbr.github.io/Bigode-Bold/preview.png" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      background: #000;
      font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
      overflow: hidden;
    }

    body {
      display: flex;
      flex-direction: column;
      height: 100dvh;
    }

    /* HALVES */
    .half {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      text-decoration: none;
      position: relative;
      overflow: hidden;
      background: #000;
      cursor: pointer;
      transition: flex 0.55s cubic-bezier(0.77, 0, 0.175, 1);
      min-height: 0;
    }

    .half:hover { flex: 1.25; }

    body:has(.half--bigode:hover) .half--bold,
    body:has(.half--bold:hover) .half--bigode {
      flex: 0.75;
    }

    /* DIVIDER */
    .half--bigode {
      border-bottom: 0.5px solid #1a1a1a;
    }

    /* VIDEO fills the half */
    .logo-video {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      pointer-events: none;
      opacity: 0.75;
      transition: opacity 0.4s ease;
    }

    .half:hover .logo-video {
      opacity: 1;
    }

    /* LABEL */
    .half-label {
      position: relative;
      z-index: 2;
      font-size: 11px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      font-weight: 400;
      color: rgba(255,255,255,0.3);
      display: flex;
      align-items: center;
      gap: 8px;
      transition: color 0.3s ease, gap 0.35s ease;
      align-self: flex-end;
      margin-bottom: clamp(20px, 4vh, 36px);
    }

    .half:hover .half-label {
      color: rgba(255,255,255,0.7);
      gap: 14px;
    }

    .arrow {
      display: inline-block;
      transition: transform 0.35s cubic-bezier(0.77, 0, 0.175, 1);
    }

    .half:hover .arrow { transform: translateX(5px); }

    /* reposition label inside half */
    .half-inner {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-end;
      z-index: 2;
    }

    /* CONTACT STRIP */
    .contact {
      background: #000;
      border-top: 0.5px solid #222;
      padding: 16px clamp(20px, 4vw, 40px);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      gap: 8px;
    }

    .contact-name {
      font-size: 13px;
      font-weight: 500;
      color: #666;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      white-space: nowrap;
    }

    .contact-links {
      display: flex;
      align-items: center;
      gap: clamp(10px, 2vw, 20px);
      flex-wrap: wrap;
      justify-content: center;
    }

    .contact-links a {
      font-size: 12px;
      color: #444;
      text-decoration: none;
      letter-spacing: 0.04em;
      transition: color 0.2s;
      white-space: nowrap;
    }

    .contact-links a:hover { color: #999; }

    .dot {
      width: 2px;
      height: 2px;
      border-radius: 50%;
      background: #333;
      flex-shrink: 0;
    }

    /* MOBILE */
    @media (max-width: 600px) {
      html, body { overflow: hidden; }

      .half { flex: none; height: calc((100dvh - 72px) / 2); transition: none; }
      .half:hover { flex: none; }
      body:has(.half--bigode:hover) .half--bold,
      body:has(.half--bold:hover) .half--bigode { flex: none; }

      .half-label { font-size: 10px; margin-bottom: 16px; }

      .contact {
        padding: 12px 20px;
        gap: 6px;
      }

      .contact-links { gap: 10px; }
      .dot { display: none; }
    }
  </style>
</head>
<body>

  <!-- BIGODE -->
  <a class="half half--bigode" href="https://bigodedesign.github.io/news/" target="_blank" rel="noopener">
    <video class="logo-video" autoplay loop muted playsinline>
      <source src="logo_bigode.mp4" type="video/mp4" />
    </video>
    <div class="half-inner">
      <span class="half-label">Bigode Design <span class="arrow">→</span></span>
    </div>
  </a>

  <!-- BOLD -->
  <a class="half half--bold" href="https://diegoemerickbr.github.io/Bold/" target="_blank" rel="noopener">
    <video class="logo-video" autoplay loop muted playsinline>
      <source src="logo_bold.mp4" type="video/mp4" />
    </video>
    <div class="half-inner">
      <span class="half-label">Bold Content <span class="arrow">→</span></span>
    </div>
  </a>

  <!-- CONTACT -->
  <div class="contact">
    <span class="contact-name">Contato:</span>
    <div class="contact-links">
      <a href="mailto:diego@bigode.design">diego@bigode.design</a>
      <span class="dot"></span>
      <a href="https://wa.me/5554984055969">54 98405-5969</a>
      <span class="dot"></span>
      <a href="mailto:diego@boldcontent.com.br">diego@boldcontent.com.br</a>
    </div>
  </div>

</body>
</html>
